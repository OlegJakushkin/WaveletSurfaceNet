# WaveletSurfaceNet -- unified mixed-base surface model.  GPU, no host setup needed.
#
#   docker compose build
#   docker compose run --rm generate --shape bunny --out out/bunny.obj
#   docker compose run --rm train --base mixed --out waveshape_mixed --epochs 6
#
# Requires the NVIDIA Container Toolkit on the host.  The repo is bind-mounted at /workspace,
# so inputs in assets/ and outputs in out/ live on the host.

x-gpu: &gpu
  build: .
  image: waveshape:latest
  volumes:
    - ./:/workspace
  shm_size: "8gb"
  deploy:
    resources:
      reservations:
        devices:
          - driver: nvidia
            count: all
            capabilities: [gpu]

services:
  # points / mesh (+ optional region box) -> mesh.  Append generate.py flags after the service name:
  #   docker compose run --rm generate --shape teapot --out out/teapot.obj
  #   docker compose run --rm generate --shape knurl --superres --out out/knurl_superres.obj
  #   docker compose run --rm generate --points my_cloud.npy --out out/mine.obj
  generate:
    <<: *gpu
    entrypoint: ["python", "generate.py"]

  # train the unified mixed-base model on ModelNet40 (expects data/ModelNet40/).  Append train.py flags:
  #   docker compose run --rm train --base mixed --out waveshape_mixed --epochs 6
  train:
    <<: *gpu
    entrypoint: ["python", "train.py"]

  # interactive shell in the GPU container (debugging / custom runs)
  shell:
    <<: *gpu
    entrypoint: ["bash"]

  # honest comparison vs public-library baselines (Open3D SPSR/BPA, libigl) -- see compare/README.md.
  #   docker compose run --rm compare compare/fig_baselines.py
  compare:
    build:
      context: .
      dockerfile: compare/Dockerfile
    image: waveshape-compare:latest
    volumes:
      - ./:/workspace
    shm_size: "8gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    entrypoint: ["python"]

  # ---- wavescene: separate monocular-image -> 3D-scene model (kept in wavescene/) ----
  wavescene-train:
    <<: *gpu
    command: python -m wavescene.train --epochs 40 --batch 2
  wavescene-eval:
    <<: *gpu
    command: python -m wavescene.eval_roster
